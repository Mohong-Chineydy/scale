</head>

                <button onclick="shareResults()">📤 分享结果</button>
                <button onclick="restartTest()">🔄 重新测试</button>

            { dimension: 'localism', text: '全球互联网使知识民主化。' }

        // ==================== 维度信息 ====================
        const DIMENSIONS = {
            economic: { name: '经济维度', desc: '左翼（高税收、政府干预）→ 右翼（自由市场、私有化）' },
            political: { name: '政治维度', desc: '中央集权 → 权力分散' },
            social: { name: '社会维度', desc: '传统/保守 → 进步/自由' },
            authoritarianism: { name: '权力集中度', desc: '个人自由 → 强权集中' },
            militarism: { name: '军国主义倾向', desc: '和平主义 → 军事优先' },
            nationalism: { name: '民族主义倾向', desc: '国际合作 → 国家优先' },
            religion: { name: '宗教信仰度', desc: '世俗化 → 宗教优先' },
            progress: { name: '进步倾向', desc: '传统优先 → 进步优先' },
            tradition: { name: '传统倾向', desc: '变革优先 → 传统优先' },
            environmentalism: { name: '环保主义', desc: '经济优先 → 环保优先' },
            individualism: { name: '个人主义', desc: '集体优先 → 个人优先' },
            collectivism: { name: '集体主义', desc: '个人优先 → 集体优先' },
            scientific: { name: '科学理性', desc: '神秘主义 → 科学理性' },
            pragmatism: { name: '务实主义', desc: '理想主义 → 务实主义' },
            idealism: { name: '理想主义', desc: '务实主义 → 理想主义' },
            localism: { name: '本地化倾向', desc: '全球化 → 本地化' }
        };

        // ==================== 全局变量 ====================
        let currentQuestion = 0;
        let answers = new Array(QUESTIONS.length).fill(null);
        let scores = {};

        // 初始化维度得分
        Object.keys(DIMENSIONS).forEach(dim => {
            scores[dim] = 0;
        });

        // ==================== 主要函数 ====================
        function startTest() {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('testScreen').style.display = 'block';
            loadQuestion(0);
        }

        function loadQuestion(index) {
            currentQuestion = index;
            const question = QUESTIONS[index];
            
            document.getElementById('questionNumber').textContent = `第 ${index + 1} / ${QUESTIONS.length} 题`;
            document.getElementById('questionText').textContent = question.text;
            
            renderOptions();
            updateProgress();
            updateStatistics();
            
            // 清除选择状态
            document.getElementById('nextBtn').disabled = true;
        }

        function renderOptions() {
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            const options = [
                { value: 1, label: '非常反对', desc: '我强烈不同意' },
                { value: 2, label: '反对', desc: '我倾向反对' },
                { value: 3, label: '中立', desc: '我保持中立' },
                { value: 4, label: '同意', desc: '我倾向同意' },
                { value: 5, label: '非常同意', desc: '我强烈同意' }
            ];
            
            const answeredValue = answers[currentQuestion];
            
            options.forEach(option => {
                const btn = document.createElement('div');
                btn.className = 'option' + (answeredValue === option.value ? ' selected' : '');
                btn.innerHTML = `
                    <span class="option-label">${option.label}</span>
                    <span class="option-description">${option.desc}</span>
                `;
                btn.onclick = () => selectOption(option.value);
                container.appendChild(btn);
            });
        }

        function selectOption(value) {
            answers[currentQuestion] = value;
            renderOptions();
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            if (currentQuestion < QUESTIONS.length - 1) {
                loadQuestion(currentQuestion + 1);
            } else {
                calculateScores();
                showResults();
            }
        }

        function skipQuestion() {
            answers[currentQuestion] = null;
            if (currentQuestion < QUESTIONS.length - 1) {
                loadQuestion(currentQuestion + 1);
            } else {
                calculateScores();
                showResults();
            }
        }

        function updateProgress() {
            const answered = answers.filter(a => a !== null).length;
            const percentage = (answered / QUESTIONS.length) * 100;
            
            document.getElementById('progressBarFill').style.width = percentage + '%';
            document.getElementById('progressText').textContent = `${answered} / ${QUESTIONS.length}`;
        }

        function updateStatistics() {
            let tempScores = {};
            Object.keys(DIMENSIONS).forEach(dim => {
                tempScores[dim] = 0;
            });
            
            answers.forEach((answer, index) => {
                if (answer !== null) {
                    const dimension = QUESTIONS[index].dimension;
                    const score = answer === 1 ? -2 : answer === 2 ? -1 : answer === 3 ? 0 : answer === 4 ? 1 : 2;
                    tempScores[dimension] += score;
                }
            });
            
            const container = document.getElementById('statisticsContainer');
            container.innerHTML = '';
            
            Object.entries(DIMENSIONS).forEach(([key, dim]) => {
                const score = tempScores[key];
                const percentage = ((score + 30) / 60) * 100; // 标准化到0-100%
                
                const item = document.createElement('div');
                item.className = 'stat-item';
                item.innerHTML = `
                    <div class="stat-label">
                        <span>${dim.name}</span>
                        <span class="stat-value">${score > 0 ? '+' : ''}${score}</span>
                    </div>
                    <div class="stat-bar">
                        <div class="stat-bar-fill" style="width: ${Math.max(0, Math.min(100, percentage))}%"></div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function calculateScores() {
            Object.keys(scores).forEach(dim => {
                scores[dim] = 0;
            });
            
            answers.forEach((answer, index) => {
                if (answer !== null) {
                    const dimension = QUESTIONS[index].dimension;
                    const score = answer === 1 ? -2 : answer === 2 ? -1 : answer === 3 ? 0 : answer === 4 ? 1 : 2;
                    scores[dimension] += score;
                }
            });
        }

        function getTendency(score) {
            if (score < -8) return { text: '极端倾向', icon: '▼▼', color: '#d32f2f' };
            if (score < -4) return { text: '中等倾向', icon: '▼', color: '#f57c00' };
            if (score <= 4) return { text: '中立立场', icon: '◄►', color: '#1976d2' };
            if (score <= 8) return { text: '中等倾向', icon: '▲', color: '#388e3c' };
            return { text: '极端倾向', icon: '▲▲', color: '#7cb342' };
        }

        function showResults() {
            document.getElementById('testScreen').style.display = 'none';
            document.getElementById('resultsScreen').style.display = 'block';
            
            const container = document.getElementById('resultsContent');
            container.innerHTML = '';
            
            // 主要维度
            const mainSection = document.createElement('div');
            mainSection.className = 'results-section';
            mainSection.innerHTML = '<h2>主要维度分析</h2>';
            
            ['economic', 'political', 'social'].forEach(dim => {
                const score = scores[dim];
                const tendency = getTendency(score);
                mainSection.innerHTML += `
                    <div class="dimension-result">
                        <div class="dimension-name">${DIMENSIONS[dim].name}</div>
                        <div class="dimension-score">
                            <span>${DIMENSIONS[dim].desc}</span>
                            <span class="score-value" style="color: ${tendency.color}">${score > 0 ? '+' : ''}${score}</span>
                        </div>
                        <div class="score-tendency">${tendency.icon} ${tendency.text}</div>
                    </div>
                `;
            });
            
            container.appendChild(mainSection);
            
            // 详细维度
            const detailSection = document.createElement('div');
            detailSection.className = 'results-section';
            detailSection.innerHTML = '<h2>详细维度数据</h2>';
            
            Object.entries(scores).forEach(([dim, score]) => {
                if (!['economic', 'political', 'social'].includes(dim)) {
                    const tendency = getTendency(score);
                    detailSection.innerHTML += `
                        <div class="dimension-result">
                            <div class="dimension-name">${DIMENSIONS[dim].name}</div>
                            <div class="dimension-score">
                                <span class="score-value" style="color: ${tendency.color}">${score > 0 ? '+' : ''}${score}</span>
                            </div>
                        </div>
                    `;
                }
            });
            
            container.appendChild(detailSection);
            
            // 分析概览
            const answered = answers.filter(a => a !== null).length;
            const confidence = ((answered / QUESTIONS.length) * 100).toFixed(1);
            
            const analysisSection = document.createElement('div');
            analysisSection.className = 'results-analysis';
            analysisSection.innerHTML = `
                <h3>📊 测试概览</h3>
                <div class="analysis-item"><strong>完成度:</strong> ${confidence}% (${answered}/${QUESTIONS.length})</div>
                <div class="analysis-item"><strong>总体分析:</strong> 基于您的回答，我们已完成了全面的政治倾向分析。您的答案跨越16个不同维度，提供了对您政治观点的深入理解。</div>
                <div class="analysis-item"><strong>维度说明:</strong> 每个维度的分数范围从 -30 到 +30，负数表示倾向左侧，正数表示倾向右侧，0 表示完全中立。</div>
            `;
            
            container.appendChild(analysisSection);
        }

        function downloadResults() {
            let content = '9Axes 政治倾向测试结果\n';
            content += '='.repeat(50) + '\n\n';
            content += `完成度: ${((answers.filter(a => a !== null).length / QUESTIONS.length) * 100).toFixed(1)}%\n`;
            content += `已回答: ${answers.filter(a => a !== null).length}/${QUESTIONS.length}\n\n`;
            content += '维度得分:\n';
            
            Object.entries(scores).forEach(([dim, score]) => {
                content += `${DIMENSIONS[dim].name}: ${score > 0 ? '+' : ''}${score}\n`;
            });
            
            content += '\n' + new Date().toLocaleString();
            
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `9axes-results-${Date.now()}.txt`;
            a.click();
        }

        function shareResults() {
            const text = `我完成了9Axes政治倾向测试！完成度: ${((answers.filter(a => a !== null).length / QUESTIONS.length) * 100).toFixed(1)}%`;
            
            if (navigator.share) {
                navigator.share({
                    title: '9Axes 政治倾向测试',
                    text: text,
                    url: window.location.href
                });
            } else {
                alert(text + '\n\n点击上方按钮可分享此链接。');
            }
        }

        function restartTest() {
            currentQuestion = 0;
            answers = new Array(QUESTIONS.length).fill(null);
            Object.keys(scores).forEach(dim => {
                scores[dim] = 0;
            });
            
            document.getElementById('welcomeScreen').style.display = 'block';
            document.getElementById('testScreen').style.display = 'none';
            document.getElementById('resultsScreen').style.display = 'none';
        }
    </script>
