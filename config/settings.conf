# 9Axes 政治倾向测试系统 - 配置文件
# Configuration file for 9Axes Political Compass Test

# ============================================================================
# 基本设置 / Basic Settings
# ============================================================================

# 语言 / Language
LANGUAGE=zh_CN

# 主题 / Theme
THEME=default

# 输出颜色 / Color Output
ENABLE_COLORS=true

# ============================================================================
# UI设置 / UI Settings
# ============================================================================

# 刷新间隔（毫秒）/ Refresh interval (milliseconds)
REFRESH_RATE=100

# 显示分隔线 / Show separator lines
SHOW_SEPARATORS=true

# 最大屏幕宽度 / Max screen width
MAX_WIDTH=80

# ============================================================================
# 题目设置 / Question Settings
# ============================================================================

# 总题数 / Total questions
TOTAL_QUESTIONS=195

# 显示题号 / Show question number
SHOW_QUESTION_NUMBER=true

# 是否允许跳题 / Allow skipping questions
ALLOW_SKIP=true

# ============================================================================
# 数据设置 / Data Settings
# ============================================================================

# 结果存储目录 / Results storage directory
RESULTS_DIR=./data/results/

# 自动保存结果 / Auto save results
AUTO_SAVE=false

# 结果格式 / Results format (json, txt, csv)
RESULTS_FORMAT=txt

# ============================================================================
# 分析设置 / Analysis Settings
# ============================================================================

# 显示完整报告 / Show full report
SHOW_FULL_REPORT=true

# 维度数量 / Number of dimensions
DIMENSIONS=16

# 显示响应模式 / Show response pattern analysis
SHOW_RESPONSE_PATTERN=true

# ============================================================================
# 高级设置 / Advanced Settings
# ============================================================================

# 调试模式 / Debug mode
DEBUG_MODE=false

# 详细日志 / Verbose logging
VERBOSE=false

# 时间戳格式 / Timestamp format
TIMESTAMP_FORMAT=%Y-%m-%d %H:%M:%S
